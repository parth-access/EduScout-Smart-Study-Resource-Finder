<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>EduScout App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🎓 EduScout</div>

    <div class="nav-actions">
      <button id="themeToggle">Theme</button>
      <button id="resetBtn">Reset</button>
    </div>
  </nav>

  <main>

    <h2>Find Learning Videos</h2>

    <!-- FORM -->
    <div class="search-form">

      <div class="form-group">
        <label>Class</label>
        <select id="classSelect">
          <option value="">Select Class</option>
          <option value="10">Class 10</option>
          <option value="11">Class 11</option>
          <option value="12">Class 12</option>
        </select>
      </div>

      <div class="form-group">
        <label>Subject</label>
        <select id="subjectSelect">
          <option value="">Select Subject</option>
          <option value="math">Math</option>
          <option value="science">Science</option>
        </select>
      </div>

      <div class="form-group">
        <label>Topic</label>
        <select id="topicSelect">
          <option value="">Select Topic</option>
        </select>
      </div>

      <button id="searchBtn" class="btn btn-primary">Start Learning</button>

    </div>

    <!-- SEARCH + SORT -->
    <div class="controls">
      <input type="text" id="searchInput" class="search-input" placeholder="Search videos...">
      <button id="sortBtn">Sort A-Z</button>
    </div>

    <!-- VIDEOS -->
    <div id="videos" class="video-grid"></div>

  </main>

  <footer>
    <p>© 2026 EduScout</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
